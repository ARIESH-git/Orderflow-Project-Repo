apiVersion: apps/v1
kind: Deployment
metadata:
  name: dynamodb-local
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dynamodb-local
  template:
    metadata:
      labels:
        app: dynamodb-local
    spec:
      securityContext:
        runAsUser: 0
      containers:
        - name: dynamodb-local
          image: {{ .Values.dynamodb.image }}
          command: ["java", "-jar", "DynamoDBLocal.jar", "-sharedDb", "-dbPath", "/home/dynamodblocal/data"]
          ports:
            - containerPort: 8000
          volumeMounts:
            - name: dynamodb-storage
              mountPath: /home/dynamodblocal/data
      volumes:
        - name: dynamodb-storage
          persistentVolumeClaim:
            claimName: dynamodb-data
