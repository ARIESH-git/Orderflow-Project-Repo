apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-consumer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inventory-consumer
  template:
    metadata:
      labels:
        app: inventory-consumer
    spec:
      initContainers:
        - name: wait-for-kafka
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z kafka 9092; do echo waiting for kafka; sleep 2; done']
        - name: wait-for-dynamodb
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z dynamodb-local 8000; do echo waiting for dynamodb-local; sleep 2; done']
        - name: wait-for-redis
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z redis 6379; do echo waiting for redis; sleep 2; done']
      containers:
        - name: inventory-consumer
          image: {{ .Values.inventoryConsumer.image }}
          imagePullPolicy: Never
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
