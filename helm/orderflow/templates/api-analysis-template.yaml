apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: api-error-rate
spec:
  metrics:
    - name: error-rate
      interval: 15s
      successCondition: result[0] <= 0.1
      failureLimit: 1
      provider:
        prometheus:
          address: http://prometheus-server.monitoring.svc.cluster.local
          query: |
            (
              sum(rate(http_requests_total{handler="/orders",status=~"5.."}[2m]))
              /
              (sum(rate(http_requests_total{handler="/orders"}[2m])) > 0)
            )
            or
            vector(0)
