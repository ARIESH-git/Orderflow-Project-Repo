apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: monitoring
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m
    route:
      group_by: ['alertname']
      group_wait: 10s
      group_interval: 10s
      repeat_interval: 1h
      receiver: 'ai-ops-copilot'
    receivers:
      - name: 'ai-ops-copilot'
        webhook_configs:
          - url: 'http://agent.default.svc.cluster.local:8080/alert'
            send_resolved: false
