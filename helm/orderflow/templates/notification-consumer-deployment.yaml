apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-consumer
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notification-consumer
  template:
    metadata:
      labels:
        app: notification-consumer
    spec:
      initContainers:
        - name: wait-for-kafka
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z kafka 9092; do echo waiting for kafka; sleep 2; done']
      containers:
        - name: notification-consumer
          image: {{ .Values.notificationConsumer.image }}
          imagePullPolicy: Never
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
