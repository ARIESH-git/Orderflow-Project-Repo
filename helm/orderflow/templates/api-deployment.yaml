apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      initContainers:
        - name: wait-for-kafka
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z kafka 9092; do echo waiting for kafka; sleep 2; done']
        - name: wait-for-dynamodb
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z dynamodb-local 8000; do echo waiting for dynamodb-local; sleep 2; done']
      containers:
        - name: api
          image: {{ .Values.api.image }}
          imagePullPolicy: Never
          ports:
            - containerPort: {{ .Values.api.port }}
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
          envFrom:
            - secretRef:
                name: orderflow-secrets
