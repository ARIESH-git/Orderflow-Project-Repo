apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: orderflow
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/ARIESH-git/Orderflow-Project-Repo.git
    targetRevision: master
    path: helm/orderflow
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
